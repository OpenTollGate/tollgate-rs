# Gateway for the exhaust test. Time-priced (price_per_second) so a small token
# drains to zero on its own within a couple of metering intervals — no traffic
# needed, which matters in sets-only mode where byte counters are always zero.
# The test asserts the gateway grants access, then suspends the peer when the
# balance runs out (emitting a balance-exhausted Reject + SetAccess(Suspended)).
listen: "0.0.0.0:4747"
unit: "bytes"
firewall: sets-only
mints:
  - "http://mint:3338"
products:
  - pricing_scale: 1000
    # 2 sat/s (scaled by 1000). An 8-sat token = 8000 scaled units, so the first
    # 5s charging interval (after the baseline sample) costs 10000 → exhausted.
    price_per_second: 2000
    price_per_unit: 0
