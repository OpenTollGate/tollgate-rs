# Exhaust topology: a child pays the gateway a small token; the time-priced
# gateway meters the balance to zero and suspends the peer. Reuses the bootstrap
# suite's fake NUT-07 mint (no second copy to drift). test.sh asserts the gateway
# grants access and then suspends on exhaustion.
#
#   mint (fake NUT-07) <-- gateway (parent) <-- client (child)
#
# gateway + client run the single tollgate-test:latest image; the mint is a stock
# python image running the bootstrap stub script (no build).

services:
  mint:
    image: python:3-slim
    container_name: tollgate-exhaust-mint
    volumes:
      - ../bootstrap/fake-mint.py:/fake-mint.py:ro
    command: ["python3", "/fake-mint.py", "3338"]
    networks:
      tollnet:
        aliases:
          - mint
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3338/v1/info')"]
      interval: 1s
      timeout: 2s
      retries: 15

  gateway:
    image: tollgate-test:latest
    container_name: tollgate-exhaust-gateway
    cap_add:
      - NET_ADMIN
    depends_on:
      mint:
        condition: service_healthy
    volumes:
      - ./gateway.yaml:/etc/tollgate/tollgate.yaml:ro
    command: ["--config", "/etc/tollgate/tollgate.yaml", "serve"]
    environment:
      RUST_LOG: info
    networks:
      tollnet:
        aliases:
          - gateway
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "-X", "POST", "--data-binary", "", "http://localhost:4747/tollgate/v1/exchange"]
      interval: 1s
      timeout: 2s
      retries: 15

  client:
    image: tollgate-test:latest
    container_name: tollgate-exhaust-client
    depends_on:
      gateway:
        condition: service_healthy
    volumes:
      - ./client.yaml:/etc/tollgate/tollgate.yaml:ro
    command:
      - "--config"
      - "/etc/tollgate/tollgate.yaml"
      - "pay"
      - "--peer"
      - "http://gateway:4747"
      - "--mint"
      - "http://mint:3338"
      - "--amount"
      - "8"
    environment:
      RUST_LOG: info
    networks:
      - tollnet

networks:
  tollnet:
    driver: bridge
