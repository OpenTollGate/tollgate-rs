# Bootstrap-payment topology: child pays the gateway, which verifies the token
# against a fake mint and grants access.
#
#   mint (fake NUT-07) ←── gateway (parent) ←── client (child)
#
# gateway + client run the single tollgate-test:latest image. The mint is a
# stock python image running a stub script (no build), so the "build our binary
# once" property is preserved. test.sh asserts the bootstrap is accepted.

services:
  mint:
    image: python:3-slim
    container_name: tollgate-bootstrap-mint
    volumes:
      - ./fake-mint.py:/fake-mint.py:ro
    command: ["python3", "/fake-mint.py", "3338"]
    networks:
      tollnet:
        aliases:
          - mint
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3338/v1/info')"]
      interval: 1s
      timeout: 2s
      retries: 15

  gateway:
    image: tollgate-test:latest
    container_name: tollgate-bootstrap-gateway
    cap_add:
      - NET_ADMIN
    depends_on:
      mint:
        condition: service_healthy
    volumes:
      - ./gateway.yaml:/etc/tollgate/tollgate.yaml:ro
    command: ["--config", "/etc/tollgate/tollgate.yaml", "serve"]
    environment:
      RUST_LOG: info
    networks:
      tollnet:
        aliases:
          - gateway
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "-X", "POST", "--data-binary", "", "http://localhost:4747/tollgate/v1/exchange"]
      interval: 1s
      timeout: 2s
      retries: 15

  client:
    image: tollgate-test:latest
    container_name: tollgate-bootstrap-client
    depends_on:
      gateway:
        condition: service_healthy
    volumes:
      - ./client.yaml:/etc/tollgate/tollgate.yaml:ro
    command:
      - "--config"
      - "/etc/tollgate/tollgate.yaml"
      - "pay"
      - "--peer"
      - "http://gateway:4747"
      - "--mint"
      - "http://mint:3338"
      - "--amount"
      - "8"
    environment:
      RUST_LOG: info
    networks:
      - tollnet

networks:
  tollnet:
    driver: bridge
