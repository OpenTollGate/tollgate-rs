# Child node for the sandbox. Runs `serve` like the gateway, and BUYS from the
# gateway as an upstream — so the peering is mutual: both nodes' tolltop show the
# other as a single bidirectional peer (DELIVERED to it / RECEIVED from it, with a
# NET balance). The node pays + auto-tops-up the upstream on its own.
unit: "bytes"
firewall: sets-only
secret_key_file: /root/client.key
upstreams:
  - peer: "http://gateway:4747"
    mint: "http://mint:3338"
    amount: 20
    topup: 20
    interval_secs: 2
products:
  - pricing_scale: 1000
    # 0 keeps paid peers Active indefinitely (no traffic, no drain) — a stable
    # dashboard to explore. Set e.g. 50 to watch balances tick down in tolltop
    # every 5s and flip to Suspended when they hit zero.
    price_per_second: 0
    price_per_unit: 1
# control_socket defaults to /tmp/tollgate.sock — where `tolltop` looks by default.
