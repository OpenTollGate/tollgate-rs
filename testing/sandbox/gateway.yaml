# Gateway for the manual-testing sandbox. Long-running; sells metered access and
# serves the control socket that `tolltop` reads.
listen: "0.0.0.0:4747"
unit: "bytes"
firewall: sets-only
mints:
  - "http://mint:3338"
products:
  - pricing_scale: 1000
    # 0 keeps paid peers Active indefinitely (no traffic, no drain) — a stable
    # dashboard to explore. Set e.g. 50 to watch balances tick down in tolltop
    # every 5s and flip to Suspended when they hit zero.
    price_per_second: 0
    price_per_unit: 1
# control_socket defaults to /tmp/tollgate.sock — where `tolltop` looks by default.
