# Manual-testing sandbox: a long-running gateway + fake NUT-07 mint + a keep-alive
# client you exec into to pay. Nothing tears itself down — bring it up with
# ./up.sh and drive it by hand (see the cheat-sheet up.sh prints). Reuses the
# bootstrap fake mint and the tollgate-test:latest image.
#
#   mint (fake) <-- gateway (serve + control socket) <-- client (exec in to pay)

services:
  mint:
    image: python:3-slim
    container_name: tollgate-sandbox-mint
    volumes:
      - ../bootstrap/fake-mint.py:/fake-mint.py:ro
    command: ["python3", "/fake-mint.py", "3338"]
    networks:
      tollnet:
        aliases:
          - mint
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3338/v1/info')"]
      interval: 1s
      timeout: 2s
      retries: 15

  gateway:
    image: tollgate-test:latest
    container_name: tollgate-sandbox-gateway
    cap_add:
      - NET_ADMIN
    depends_on:
      mint:
        condition: service_healthy
    volumes:
      - ./gateway.yaml:/etc/tollgate/tollgate.yaml:ro
    command: ["--config", "/etc/tollgate/tollgate.yaml", "serve"]
    environment:
      RUST_LOG: info
    networks:
      tollnet:
        aliases:
          - gateway
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "-X", "POST", "--data-binary", "", "http://localhost:4747/tollgate/v1/exchange"]
      interval: 1s
      timeout: 2s
      retries: 15

  client:
    image: tollgate-test:latest
    container_name: tollgate-sandbox-client
    cap_add:
      - NET_ADMIN
    depends_on:
      gateway:
        condition: service_healthy
    volumes:
      - ./client.yaml:/etc/tollgate/tollgate.yaml:ro
    # The child is a full node too: it runs `serve`, so it has its own control
    # socket and `tolltop` works inside it. You `exec` in to run `tollgate pay`
    # against the gateway — the pay uses the same identity as this node.
    command: ["--config", "/etc/tollgate/tollgate.yaml", "serve"]
    environment:
      RUST_LOG: info
    networks:
      tollnet:
        aliases:
          - client

networks:
  tollnet:
    driver: bridge
