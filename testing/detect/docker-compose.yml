# Parent-child detection topology.
#
#   gateway (parent) ── tollgate-net ── client (child)
#
# Both run the single tollgate-test:latest image. The gateway serves; the
# client probes it and exits. test.sh asserts mutual detection.
#
# This is the seed harness — future tests (bootstrap pay, metering) extend it.

services:
  gateway:
    image: tollgate-test:latest
    container_name: tollgate-detect-gateway
    # NET_ADMIN lets the IP adapter touch nftables even in sets-only mode.
    cap_add:
      - NET_ADMIN
    volumes:
      - ./gateway.yaml:/etc/tollgate/tollgate.yaml:ro
    command: ["--config", "/etc/tollgate/tollgate.yaml", "serve"]
    environment:
      RUST_LOG: info
    networks:
      tollnet:
        aliases:
          - gateway
    healthcheck:
      # The node is up once the TCP port accepts connections.
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:4747/tollgate/v1/exchange", "-X", "POST", "--data-binary", ""]
      interval: 1s
      timeout: 2s
      retries: 15

  client:
    image: tollgate-test:latest
    container_name: tollgate-detect-client
    depends_on:
      gateway:
        condition: service_healthy
    volumes:
      - ./client.yaml:/etc/tollgate/tollgate.yaml:ro
    command: ["--config", "/etc/tollgate/tollgate.yaml", "connect", "--peer", "http://gateway:4747"]
    environment:
      RUST_LOG: info
    networks:
      - tollnet

networks:
  tollnet:
    driver: bridge
