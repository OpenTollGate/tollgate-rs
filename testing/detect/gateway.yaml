# Parent node (gateway). Sells access; listens for child peers.
# Ephemeral identity is fine for the detection test — we only assert that the
# child learns *some* gateway pubkey and vice-versa.
listen: "0.0.0.0:4747"
unit: "bytes"
# No firewall enforcement inside the test container (no real forwarding yet);
# sets-only avoids installing a drop-policy chain that needs extra capabilities.
firewall: sets-only
products:
  - pricing_scale: 1000
    price_per_second: 0
    price_per_unit: 1
