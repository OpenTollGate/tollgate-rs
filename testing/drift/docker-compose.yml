# Drift suite: a lying / malfunctioning peer is cut off after persistent metering
# drift. Same transit topology as the traffic demo (real bytes forwarded through
# the gateway). The client meters what it actually received INDEPENDENTLY — by the
# gateway's next-hop MAC (--meter-upstream), correct even when peers share an
# interface — then UNDER-REPORTS it by 50% (--understate-received-pct 50). The
# gateway compares its own delivered against that, and after 3 consecutive
# over-tolerance intervals warns then suspends the peer.
#
#   edge net (172.30.0.0/24)         uplink net (172.31.0.0/24)
#   mint ─┐                          ┌─ upstream
#         ├─ client ── gateway ──────┤
#         ┘  (lies)  (forwards+meters)
#
# Reuses the bootstrap fake mint and the tollgate-test:latest image.

services:
  mint:
    image: python:3-slim
    container_name: tollgate-drift-mint
    volumes:
      - ../bootstrap/fake-mint.py:/fake-mint.py:ro
    command: ["python3", "/fake-mint.py", "3338"]
    networks:
      edge:
        ipv4_address: 172.30.0.30
        aliases: [mint]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3338/v1/info')"]
      interval: 1s
      timeout: 2s
      retries: 15

  gateway:
    image: tollgate-test:latest
    container_name: tollgate-drift-gateway
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    depends_on:
      mint:
        condition: service_healthy
    volumes:
      - ./gateway.yaml:/etc/tollgate/tollgate.yaml:ro
    command: ["--config", "/etc/tollgate/tollgate.yaml", "serve"]
    environment:
      RUST_LOG: info
    networks:
      edge:
        ipv4_address: 172.30.0.10
        aliases: [gateway]
      uplink:
        ipv4_address: 172.31.0.10
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "-X", "POST", "--data-binary", "", "http://localhost:4747/tollgate/v1/exchange"]
      interval: 1s
      timeout: 2s
      retries: 15

  # A bare host behind the gateway; the kernel answers pings, and a static route
  # sends replies back to the edge net via the gateway so the round trip is
  # forwarded (and thus metered).
  upstream:
    image: tollgate-test:latest
    container_name: tollgate-drift-upstream
    cap_add:
      - NET_ADMIN
    entrypoint:
      - "sh"
      - "-c"
      - "ip route add 172.30.0.0/24 via 172.31.0.10 && exec sleep infinity"
    networks:
      uplink:
        ipv4_address: 172.31.0.20

  client:
    image: tollgate-test:latest
    container_name: tollgate-drift-client
    cap_add:
      - NET_ADMIN
    depends_on:
      gateway:
        condition: service_healthy
    volumes:
      - ./client.yaml:/etc/tollgate/tollgate.yaml:ro
    # Route to the upstream via the gateway, start a LYING consume loop (it
    # acknowledges only half of what it receives), wait for it to bootstrap, then
    # flood ping to generate metered transit. Bounded so the suite exits on its
    # own: ~4s warm-up + ~12s of traffic is well past the 3-interval cut-off.
    entrypoint:
      - "sh"
      - "-c"
      - >-
        ip route add 172.31.0.0/24 via 172.30.0.10;
        tollgate --config /etc/tollgate/tollgate.yaml consume
        --peer http://gateway:4747 --mint http://mint:3338
        --amount 20000 --topup 10000 --interval 1
        --meter-upstream --understate-received-pct 50 &
        sleep 4;
        timeout 12 ping -i 0.05 -s 1400 172.31.0.20 >/dev/null 2>&1 || true;
        sleep 2;
        echo DRIFT_CLIENT_DONE
    environment:
      RUST_LOG: info
    networks:
      edge:
        ipv4_address: 172.30.0.20

networks:
  edge:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
  uplink:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/24
