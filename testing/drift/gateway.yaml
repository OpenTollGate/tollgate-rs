# Gateway for the drift suite. ENFORCING mode installs the nftables forward chain
# with per-peer byte counters, so it independently meters the transit traffic it
# delivers to the client. metering_interval_secs: 1 keeps the test quick — three
# over-tolerance intervals (the default cut-off) is then ~3s of traffic.
#
# Price is non-zero (1 milli-sat/byte) but the client's balance is large enough to
# never exhaust within the test window, so the cut-off here is unambiguously from
# metering drift, not exhaustion.
listen: "0.0.0.0:4747"
unit: "bytes"
firewall: enforcing
metering_interval_secs: 1
mints:
  - "http://mint:3338"
products:
  - pricing_scale: 1000
    price_per_second: 0
    price_per_unit: 1 # 1 milli-sat per byte delivered to the peer
