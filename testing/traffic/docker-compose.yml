# Traffic demo: real metered transit traffic flowing THROUGH the gateway.
#
#   edge net (172.30.0.0/24)         uplink net (172.31.0.0/24)
#   mint ─┐                          ┌─ upstream
#         ├─ client ── gateway ──────┤
#         ┘   (pays)  (forwards+meters)
#
# The client routes to the upstream via the gateway, which forwards the packets
# (ip_forward) and — in enforcing mode — counts the per-peer bytes. The client
# `consume`s (auto-tops-up) and floods ping to the upstream, so the gateway's
# tolltop shows SENT/RECV climbing and BALANCE draining. Reuses the bootstrap
# fake mint and the tollgate-test:latest image.

services:
  mint:
    image: python:3-slim
    container_name: tollgate-traffic-mint
    volumes:
      - ../bootstrap/fake-mint.py:/fake-mint.py:ro
    command: ["python3", "/fake-mint.py", "3338"]
    networks:
      edge:
        ipv4_address: 172.30.0.30
        aliases: [mint]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3338/v1/info')"]
      interval: 1s
      timeout: 2s
      retries: 15

  gateway:
    image: tollgate-test:latest
    container_name: tollgate-traffic-gateway
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    depends_on:
      mint:
        condition: service_healthy
    volumes:
      - ./gateway.yaml:/etc/tollgate/tollgate.yaml:ro
    command: ["--config", "/etc/tollgate/tollgate.yaml", "serve"]
    environment:
      RUST_LOG: info
    networks:
      edge:
        ipv4_address: 172.30.0.10
        aliases: [gateway]
      uplink:
        ipv4_address: 172.31.0.10
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "-X", "POST", "--data-binary", "", "http://localhost:4747/tollgate/v1/exchange"]
      interval: 1s
      timeout: 2s
      retries: 15

  # A bare host behind the gateway. The kernel answers pings; a static route sends
  # replies back to the edge net via the gateway so the round trip is forwarded.
  upstream:
    image: tollgate-test:latest
    container_name: tollgate-traffic-upstream
    cap_add:
      - NET_ADMIN
    entrypoint:
      - "sh"
      - "-c"
      - "ip route add 172.30.0.0/24 via 172.31.0.10 && exec sleep infinity"
    networks:
      uplink:
        ipv4_address: 172.31.0.20

  client:
    image: tollgate-test:latest
    container_name: tollgate-traffic-client
    cap_add:
      - NET_ADMIN
    depends_on:
      gateway:
        condition: service_healthy
    volumes:
      - ./client.yaml:/etc/tollgate/tollgate.yaml:ro
    # Route to the upstream via the gateway, start consuming (pay + auto-top-up)
    # in the background, then flood ping to the upstream to generate metered
    # transit traffic. The CONSUME log goes to stdout; ping output is discarded.
    entrypoint:
      - "sh"
      - "-c"
      - >-
        ip route add 172.31.0.0/24 via 172.30.0.10;
        tollgate --config /etc/tollgate/tollgate.yaml consume
        --peer http://gateway:4747 --mint http://mint:3338
        --amount 20000 --topup 10000 --interval 2 &
        sleep 6;
        exec ping -i 0.05 -s 1400 172.31.0.20 >/dev/null 2>&1
    environment:
      RUST_LOG: info
    networks:
      edge:
        ipv4_address: 172.30.0.20

networks:
  edge:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
  uplink:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/24
