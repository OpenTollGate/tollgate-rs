# Gateway for the traffic demo. ENFORCING mode installs the nftables forward
# chain with per-peer byte counters, so it counts the client's transit traffic
# (client <-> upstream) and charges per byte delivered. Watch it in tolltop:
# SENT/RECV climb (B -> KB -> MB) and BALANCE drains as bytes flow.
listen: "0.0.0.0:4747"
unit: "bytes"
firewall: enforcing
metering_interval_secs: 2
mints:
  - "http://mint:3338"
products:
  - pricing_scale: 1000
    price_per_second: 0
    price_per_unit: 1 # 1 milli-sat per byte delivered to the peer
