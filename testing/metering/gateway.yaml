# Gateway for the metering test. Time-priced so a small token visibly drains;
# the client's `consume` loop tops up before it runs out, so the peer stays
# Active throughout (the gateway sends a MeteringReport each interval).
listen: "0.0.0.0:4747"
unit: "bytes"
firewall: sets-only
# Report every second so the client gets feedback quickly (the drain rate is
# unchanged — cost is per elapsed second).
metering_interval_secs: 1
mints:
  - "http://mint:3338"
products:
  - pricing_scale: 1000
    price_per_second: 100 # drains a 4-sat token over ~40s; topups keep it alive
    price_per_unit: 0
