# Metering topology: the child pays once, then `consume` polls the time-priced
# gateway for MeteringReports and auto-tops-up before exhaustion — so the peer
# stays Active. Reuses the bootstrap fake mint and the tollgate-test:latest image.
#
#   mint (fake) <-- gateway (serve, time-priced) <-- client (consume)

services:
  mint:
    image: python:3-slim
    container_name: tollgate-metering-mint
    volumes:
      - ../bootstrap/fake-mint.py:/fake-mint.py:ro
    command: ["python3", "/fake-mint.py", "3338"]
    networks:
      tollnet:
        aliases:
          - mint
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3338/v1/info')"]
      interval: 1s
      timeout: 2s
      retries: 15

  gateway:
    image: tollgate-test:latest
    container_name: tollgate-metering-gateway
    cap_add:
      - NET_ADMIN
    depends_on:
      mint:
        condition: service_healthy
    volumes:
      - ./gateway.yaml:/etc/tollgate/tollgate.yaml:ro
    command: ["--config", "/etc/tollgate/tollgate.yaml", "serve"]
    environment:
      RUST_LOG: info
    networks:
      tollnet:
        aliases:
          - gateway
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "-X", "POST", "--data-binary", "", "http://localhost:4747/tollgate/v1/exchange"]
      interval: 1s
      timeout: 2s
      retries: 15

  client:
    image: tollgate-test:latest
    container_name: tollgate-metering-client
    depends_on:
      gateway:
        condition: service_healthy
    volumes:
      - ./client.yaml:/etc/tollgate/tollgate.yaml:ro
    command:
      - "--config"
      - "/etc/tollgate/tollgate.yaml"
      - "consume"
      - "--peer"
      - "http://gateway:4747"
      - "--mint"
      - "http://mint:3338"
      - "--amount"
      - "4"
      - "--topup"
      - "4"
      - "--interval"
      - "1"
      - "--polls"
      - "12"
    environment:
      RUST_LOG: info
    networks:
      - tollnet

networks:
  tollnet:
    driver: bridge
