<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 580" font-family="monospace" font-size="12">
  <style>
    text          { fill: #e0e0e0; }
    text.title    { font-size: 16px; font-weight: bold; }
    text.subtitle { font-size: 12px; fill: #909090; }
    text.nlabel   { font-size: 13px; font-weight: bold; }
    text.nrole    { font-size: 10px; fill: #909090; }
    text.elabel   { font-size: 10px; fill: #b0b0b0; }
    text.plabel   { font-size: 10px; fill: #d0a040; font-weight: bold; }
    text.caption  { font-size: 11px; fill: #707080; font-style: italic; }
    text.mlabel   { font-size: 11px; font-weight: bold; }
    text.mdesc    { font-size: 9px; fill: #909090; }

    .bg           { fill: #0d1117; }
    .callout      { fill: #151520; }
    .node         { fill: #2e3a5e; stroke: #5080c0; }

    @media (prefers-color-scheme: light) {
      text          { fill: #1f2328; }
      text.subtitle, text.nrole, text.plabel, text.annot, text.altlabel,
      text.elabel, text.mdesc, text.tlabel, text.sdesc { fill: #656d76; }
      text.caption  { fill: #7c8186; }
      line.sep, line.life { stroke: #d1d9e0; }
      rect.alt      { stroke: #d1d9e0; }
      .bg           { fill: #ffffff; }
      .callout      { fill: #f6f8fa; }
      .node, rect.node { fill: #ddf4ff; stroke: #0969da; }
      rect.compute, rect.result { fill: #f6f8fa; }
    }
  </style>

  <!-- Background -->
  <rect width="820" height="580" rx="8" class="bg"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" class="title">Per-Interface Instances (Multi-Egress Segmentation)</text>
  <text x="410" y="46" text-anchor="middle" class="subtitle">One TollGate + FIPS instance per egress path — independent pricing per traffic class</text>

  <!-- Carrol node -->
  <rect x="55" y="210" width="140" height="70" rx="6" class="callout" stroke="#5080c0" stroke-width="2"/>
  <text x="125" y="237" text-anchor="middle" class="nlabel" fill="#80b0e0">Carrol</text>
  <text x="125" y="253" text-anchor="middle" class="nrole">TollGate + FIPS</text>
  <text x="125" y="268" text-anchor="middle" class="nrole">(single instance)</text>

  <!-- Shared physical link -->
  <line x1="195" y1="245" x2="310" y2="245" stroke="#606080" stroke-width="3"/>
  <text x="252" y="235" text-anchor="middle" class="mdesc">shared physical link</text>
  <text x="252" y="260" text-anchor="middle" class="mdesc">(fiber / WiFi)</text>

  <!-- Multi-egress router outer box -->
  <rect x="310" y="80" width="480" height="340" rx="8" fill="none" stroke="#404060" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="550" y="100" text-anchor="middle" class="mlabel" fill="#707080">Multi-Egress Router (same physical device)</text>

  <!-- Eric: TollGate + FIPS for Fiber -->
  <rect x="340" y="130" width="200" height="90" rx="6" class="callout" stroke="#40a060" stroke-width="2"/>
  <text x="440" y="155" text-anchor="middle" class="nlabel" fill="#80e080">Eric</text>
  <text x="440" y="172" text-anchor="middle" class="nrole">TollGate + FIPS</text>
  <text x="440" y="190" text-anchor="middle" class="nrole">npub: 02eric...</text>
  <text x="440" y="208" text-anchor="middle" class="plabel">price: 2 sat/MB</text>

  <!-- Dave: TollGate + FIPS for LoRa -->
  <rect x="340" y="270" width="200" height="90" rx="6" class="callout" stroke="#c04040" stroke-width="2"/>
  <text x="440" y="295" text-anchor="middle" class="nlabel" fill="#e08080">Dave</text>
  <text x="440" y="312" text-anchor="middle" class="nrole">TollGate + FIPS</text>
  <text x="440" y="330" text-anchor="middle" class="nrole">npub: 02dave...</text>
  <text x="440" y="348" text-anchor="middle" class="plabel">price: 50 sat/MB</text>

  <!-- Fiber egress from Eric -->
  <line x1="540" y1="175" x2="620" y2="175" stroke="#40a060" stroke-width="2"/>
  <text x="630" y="172" class="mdesc">Fiber</text>
  <text x="630" y="186" class="mdesc">interface</text>

  <!-- LoRa egress from Dave -->
  <line x1="540" y1="315" x2="620" y2="315" stroke="#c04040" stroke-width="2"/>
  <text x="630" y="312" class="mdesc">LoRa</text>
  <text x="630" y="326" class="mdesc">interface</text>

  <!-- Server_Alice -->
  <rect x="660" y="145" width="120" height="50" rx="6" class="callout" stroke="#40a060" stroke-width="1.5"/>
  <text x="720" y="168" text-anchor="middle" class="nlabel" fill="#80e080">Server</text>
  <text x="720" y="184" text-anchor="middle" class="nrole">Alice's destination</text>

  <!-- Server_Bob -->
  <rect x="660" y="290" width="120" height="50" rx="6" class="callout" stroke="#c04040" stroke-width="1.5"/>
  <text x="720" y="313" text-anchor="middle" class="nlabel" fill="#e08080">Server</text>
  <text x="720" y="329" text-anchor="middle" class="nrole">Bob's destination</text>

  <!-- Alice client -->
  <rect x="30" y="380" width="120" height="50" rx="6" class="callout" stroke="#40a060" stroke-width="2"/>
  <text x="90" y="403" text-anchor="middle" class="nlabel" fill="#80e080">Alice</text>
  <text x="90" y="419" text-anchor="middle" class="nrole">Client</text>

  <!-- Bob client -->
  <rect x="170" y="380" width="120" height="50" rx="6" class="callout" stroke="#c04040" stroke-width="2"/>
  <text x="230" y="403" text-anchor="middle" class="nlabel" fill="#e08080">Bob</text>
  <text x="230" y="419" text-anchor="middle" class="nrole">Client</text>

  <!-- Alice → Carrol connection -->
  <line x1="90" y1="380" x2="100" y2="280" stroke="#40a060" stroke-width="1.5"/>

  <!-- Bob → Carrol connection -->
  <line x1="230" y1="380" x2="145" y2="280" stroke="#c04040" stroke-width="1.5"/>

  <!-- Payment channel: Carrol ↔ Eric (green dashed) -->
  <line x1="195" y1="225" x2="340" y2="175" stroke="#40a060" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Payment channel: Carrol ↔ Dave (red dashed) -->
  <line x1="195" y1="265" x2="340" y2="315" stroke="#c04040" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Caption area -->
  <rect x="40" y="450" width="740" height="110" rx="6" class="callout" stroke="#404060" stroke-width="1"/>

  <text x="60" y="472" class="mlabel">How it works:</text>
  <text x="60" y="490" class="mdesc">1. Carrol sees Eric and Dave as two independent FIPS peers (different npubs)</text>
  <text x="60" y="506" class="mdesc">2. Carrol opens separate payment channels with each — independent pricing per traffic class</text>
  <text x="60" y="522" class="mdesc">3. FIPS routes Alice's traffic through Eric (cheapest path), Bob's through Dave (only path)</text>
  <text x="60" y="538" class="mdesc">4. Carrol observes which channel drains and prices each downstream peer accordingly</text>

  <text x="560" y="490" class="mdesc" fill="#40a060">Green = Alice's path (fiber, cheap)</text>
  <text x="560" y="506" class="mdesc" fill="#c04040">Red = Bob's path (LoRa, expensive)</text>
  <text x="560" y="522" class="mdesc" fill="#d0a040">Dashed = payment channels</text>
</svg>
