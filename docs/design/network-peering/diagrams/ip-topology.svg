<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 470" font-family="monospace" font-size="12">
  <style>
    text          { fill: #e0e0e0; }
    text.title    { font-size: 16px; font-weight: bold; }
    text.subtitle { font-size: 12px; fill: #909090; }
    text.nlabel   { font-size: 13px; font-weight: bold; }
    text.nrole    { font-size: 10px; fill: #909090; }
    text.elabel   { font-size: 9px; fill: #b0b0b0; }
    text.caption  { font-size: 11px; fill: #707080; font-style: italic; }

    .bg           { fill: #0d1117; }
    .callout      { fill: #151520; }
    .node         { fill: #2e3a5e; stroke: #5080c0; }

    @media (prefers-color-scheme: light) {
      text          { fill: #1f2328; }
      text.subtitle, text.nrole, text.plabel, text.annot, text.altlabel,
      text.elabel, text.mdesc, text.tlabel, text.sdesc { fill: #656d76; }
      text.caption  { fill: #7c8186; }
      line.sep, line.life { stroke: #d1d9e0; }
      rect.alt      { stroke: #d1d9e0; }
      .bg           { fill: #ffffff; }
      .callout      { fill: #f6f8fa; }
      .node, rect.node { fill: #ddf4ff; stroke: #0969da; }
      rect.compute, rect.result { fill: #f6f8fa; }
    }
  </style>

  <!-- Background -->
  <rect width="720" height="470" rx="8" class="bg"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" class="title">IP Peering Topology</text>
  <text x="360" y="46" text-anchor="middle" class="subtitle">Tree — every hop independently priced</text>

  <!-- Internet -->
  <rect x="300" y="65" width="120" height="44" rx="6" class="callout" stroke="#909090" stroke-width="1.5"/>
  <text x="360" y="85" text-anchor="middle" class="nlabel" fill="#b0b0b0">Internet</text>
  <text x="360" y="100" text-anchor="middle" class="nrole">upstream</text>

  <!-- Gateway a -->
  <rect x="300" y="150" width="120" height="44" rx="6" class="callout" stroke="#5080c0" stroke-width="2"/>
  <text x="360" y="170" text-anchor="middle" class="nlabel" fill="#80b0e0">a</text>
  <text x="360" y="185" text-anchor="middle" class="nrole">Gateway</text>

  <!-- Relays b, c -->
  <rect x="140" y="245" width="120" height="44" rx="6" class="callout" stroke="#d0a040" stroke-width="2"/>
  <text x="200" y="265" text-anchor="middle" class="nlabel" fill="#e0c060">b</text>
  <text x="200" y="280" text-anchor="middle" class="nrole">Relay</text>

  <rect x="440" y="245" width="120" height="44" rx="6" class="callout" stroke="#d0a040" stroke-width="2"/>
  <text x="500" y="265" text-anchor="middle" class="nlabel" fill="#e0c060">c</text>
  <text x="500" y="280" text-anchor="middle" class="nrole">Relay</text>

  <!-- Clients d, e, f -->
  <rect x="40" y="345" width="120" height="44" rx="6" class="callout" stroke="#40a060" stroke-width="2"/>
  <text x="100" y="365" text-anchor="middle" class="nlabel" fill="#80e080">d</text>
  <text x="100" y="380" text-anchor="middle" class="nrole">Client</text>

  <rect x="360" y="345" width="120" height="44" rx="6" class="callout" stroke="#40a060" stroke-width="2"/>
  <text x="420" y="365" text-anchor="middle" class="nlabel" fill="#80e080">e</text>
  <text x="420" y="380" text-anchor="middle" class="nrole">Client</text>

  <rect x="520" y="345" width="120" height="44" rx="6" class="callout" stroke="#40a060" stroke-width="2"/>
  <text x="580" y="365" text-anchor="middle" class="nlabel" fill="#80e080">f</text>
  <text x="580" y="380" text-anchor="middle" class="nrole">Client</text>

  <!-- Tree edges (downward visual; payment flows upward as Cashu) -->
  <!-- Internet → a -->
  <line x1="360" y1="109" x2="360" y2="150" stroke="#909090" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- a → b -->
  <line x1="335" y1="194" x2="220" y2="245" stroke="#909090" stroke-width="1"/>
  <text x="270" y="222" text-anchor="middle" class="elabel" fill="#d0a040">$</text>

  <!-- a → c -->
  <line x1="385" y1="194" x2="480" y2="245" stroke="#909090" stroke-width="1"/>
  <text x="438" y="222" text-anchor="middle" class="elabel" fill="#d0a040">$</text>

  <!-- b → d -->
  <line x1="170" y1="289" x2="120" y2="345" stroke="#909090" stroke-width="1"/>
  <text x="138" y="320" text-anchor="middle" class="elabel" fill="#d0a040">$</text>

  <!-- c → e -->
  <line x1="475" y1="289" x2="430" y2="345" stroke="#909090" stroke-width="1"/>
  <text x="445" y="320" text-anchor="middle" class="elabel" fill="#d0a040">$</text>

  <!-- c → f -->
  <line x1="525" y1="289" x2="570" y2="345" stroke="#909090" stroke-width="1"/>
  <text x="555" y="320" text-anchor="middle" class="elabel" fill="#d0a040">$</text>

  <!-- Caption -->
  <text x="360" y="425" text-anchor="middle" class="caption">Downstream pays upstream at each hop. $ = Cashu ecash, priced per link.</text>
  <text x="360" y="445" text-anchor="middle" class="caption">a charges b and c. b charges d. c charges e and f. Routing via OS IP stack.</text>
</svg>
