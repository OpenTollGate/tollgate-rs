<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="monospace" font-size="12">
  <style>
    text          { fill: #e0e0e0; }
    text.title    { font-size: 16px; font-weight: bold; }
    text.subtitle { font-size: 12px; fill: #909090; }
    text.nlabel   { font-size: 13px; font-weight: bold; }
    text.nrole    { font-size: 10px; fill: #909090; }
    text.plabel   { font-size: 13px; font-weight: bold; fill: #909090; }
    text.annot    { font-size: 10px; fill: #909090; font-style: italic; }
    text.alabel   { font-size: 11px; }
    text.caption  { font-size: 11px; fill: #707080; font-style: italic; }
    line.sep      { stroke: #303040; stroke-width: 1; stroke-dasharray: 6,4; }
    line.life     { stroke: #303040; stroke-width: 1; stroke-dasharray: 2,3; }
  </style>

  <defs>
    <marker id="aR2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#5080c0"/>
    </marker>
    <marker id="aL2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#d0a040"/>
    </marker>
    <marker id="aG2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#40a060"/>
    </marker>
    <marker id="aT2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#50a0c0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="520" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" class="title">Bootstrap to Spilman Upgrade</text>
  <text x="360" y="46" text-anchor="middle" class="subtitle">Token gets peer online, then upgrades to streaming payment</text>

  <!-- Node headers -->
  <rect x="80" y="65" width="100" height="42" fill="#2e3a5e" stroke="#5080c0" stroke-width="2" rx="6"/>
  <text x="130" y="85" text-anchor="middle" class="nlabel">Peer B</text>
  <text x="130" y="98" text-anchor="middle" class="nrole">Connecting</text>

  <rect x="320" y="65" width="100" height="42" fill="#2e3a5e" stroke="#5080c0" stroke-width="2" rx="6"/>
  <text x="370" y="85" text-anchor="middle" class="nlabel">Node A</text>
  <text x="370" y="98" text-anchor="middle" class="nrole">Forwarder</text>

  <rect x="550" y="65" width="100" height="42" fill="#151520" stroke="#404060" stroke-width="1.5" rx="6"/>
  <text x="600" y="85" text-anchor="middle" class="nlabel" fill="#909090">Mint</text>
  <text x="600" y="98" text-anchor="middle" class="nrole">Cashu</text>

  <!-- Lifelines -->
  <line x1="130" y1="107" x2="130" y2="490" class="life"/>
  <line x1="370" y1="107" x2="370" y2="490" class="life"/>
  <line x1="600" y1="107" x2="600" y2="490" class="life"/>

  <!-- ═══ Phase 1: Bootstrap ═══ -->
  <text x="35" y="138" text-anchor="middle" class="plabel">1</text>
  <text x="35" y="154" text-anchor="middle" class="annot">Bootstrap</text>

  <!-- B → A BootstrapToken -->
  <line x1="140" y1="145" x2="358" y2="145" stroke="#50a0c0" stroke-width="1.5" marker-end="url(#aT2)"/>
  <text x="250" y="138" text-anchor="middle" class="alabel" fill="#50a0c0">BootstrapToken</text>

  <!-- A → Mint verify -->
  <line x1="380" y1="170" x2="588" y2="170" stroke="#909090" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#aR2)"/>
  <text x="490" y="163" text-anchor="middle" class="annot">verify token</text>

  <!-- Mint → A ok -->
  <line x1="590" y1="190" x2="382" y2="190" stroke="#909090" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#aL2)"/>
  <text x="490" y="207" text-anchor="middle" class="annot">valid</text>

  <!-- A → B BootstrapAck -->
  <line x1="360" y1="215" x2="142" y2="215" stroke="#40a060" stroke-width="1.5" marker-end="url(#aG2)"/>
  <text x="250" y="208" text-anchor="middle" class="alabel" fill="#40a060">BootstrapAck (accepted)</text>

  <!-- Access granted note -->
  <rect x="85" y="230" width="330" height="22" rx="3" fill="#151520" stroke="#404060" stroke-width="1"/>
  <text x="250" y="245" text-anchor="middle" class="annot">B has connectivity — can now reach the mint</text>

  <!-- separator -->
  <line x1="60" y1="265" x2="660" y2="265" class="sep"/>

  <!-- ═══ Phase 2: Upgrade ═══ -->
  <text x="35" y="288" text-anchor="middle" class="plabel">2</text>
  <text x="35" y="304" text-anchor="middle" class="annot">Upgrade</text>

  <!-- B → Mint fund channel -->
  <line x1="140" y1="295" x2="588" y2="295" stroke="#909090" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="370" y="288" text-anchor="middle" class="annot">B creates Spilman funding via mint</text>

  <!-- B → A Accept -->
  <line x1="140" y1="325" x2="358" y2="325" stroke="#d0a040" stroke-width="1.5" marker-end="url(#aL2)"/>
  <text x="250" y="318" text-anchor="middle" class="alabel" fill="#d0a040">Accept + Spilman funding</text>

  <!-- A → B Accept -->
  <line x1="380" y1="350" x2="142" y2="350" stroke="#5080c0" stroke-width="1.5" marker-end="url(#aR2)"/>
  <text x="250" y="343" text-anchor="middle" class="alabel" fill="#5080c0">Accept + Spilman funding</text>

  <!-- B → A ChannelReady -->
  <line x1="140" y1="380" x2="358" y2="380" stroke="#40a060" stroke-width="1.5" marker-end="url(#aG2)"/>
  <text x="250" y="373" text-anchor="middle" class="alabel" fill="#40a060">ChannelReady</text>

  <!-- A → B ChannelReady -->
  <line x1="360" y1="405" x2="142" y2="405" stroke="#40a060" stroke-width="1.5" marker-end="url(#aG2)"/>
  <text x="250" y="398" text-anchor="middle" class="alabel" fill="#40a060">ChannelReady</text>

  <!-- separator -->
  <line x1="60" y1="430" x2="660" y2="430" class="sep"/>

  <!-- Result -->
  <rect x="100" y="445" width="510" height="28" rx="4" fill="#151520" stroke="#40a060" stroke-width="1.5"/>
  <text x="355" y="463" text-anchor="middle" class="alabel" fill="#40a060">Spilman channels active — bootstrap balance abandoned</text>

  <!-- Caption -->
  <text x="360" y="500" text-anchor="middle" class="caption">Bootstrap is skipped entirely if B already has mint connectivity through other peers</text>
</svg>
