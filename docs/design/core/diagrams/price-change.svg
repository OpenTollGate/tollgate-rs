<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" font-family="monospace" font-size="12">
  <style>
    text          { fill: #e0e0e0; }
    text.title    { font-size: 16px; font-weight: bold; }
    text.subtitle { font-size: 12px; fill: #909090; }
    text.nlabel   { font-size: 13px; font-weight: bold; }
    text.nrole    { font-size: 10px; fill: #909090; }
    text.plabel   { font-size: 13px; font-weight: bold; fill: #909090; }
    text.annot    { font-size: 10px; fill: #909090; font-style: italic; }
    text.alabel   { font-size: 11px; }
    text.caption  { font-size: 11px; fill: #707080; font-style: italic; }
    text.altlabel { font-size: 10px; font-weight: bold; fill: #909090; }
    line.sep      { stroke: #303040; stroke-width: 1; stroke-dasharray: 6,4; }
    line.life     { stroke: #303040; stroke-width: 1; stroke-dasharray: 2,3; }
    rect.alt      { fill: none; stroke: #303040; stroke-width: 1; stroke-dasharray: 4,3; }

    .bg           { fill: #0d1117; }
    .callout      { fill: #151520; }
    .node         { fill: #2e3a5e; stroke: #5080c0; }

    @media (prefers-color-scheme: light) {
      text          { fill: #1f2328; }
      text.subtitle, text.nrole, text.plabel, text.annot, text.altlabel,
      text.elabel, text.mdesc, text.tlabel { fill: #656d76; }
      text.caption  { fill: #7c8186; }
      line.sep, line.life { stroke: #d1d9e0; }
      rect.alt      { stroke: #d1d9e0; }
      .bg           { fill: #ffffff; }
      .callout      { fill: #f6f8fa; }
      .node, rect.node { fill: #ddf4ff; stroke: #0969da; }
      rect.compute, rect.result { fill: #f6f8fa; }
    }
  </style>

  <defs>
    <marker id="aR" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#5080c0"/>
    </marker>
    <marker id="aL" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#d0a040"/>
    </marker>
    <marker id="aG" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#40a060"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="540" rx="8" class="bg"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" class="title">Price Change at Metering Interval</text>
  <text x="360" y="46" text-anchor="middle" class="subtitle">New pricing piggybacked on MeteringReport — accept by continuing, reject by closing</text>

  <!-- Node headers -->
  <rect x="110" y="65" width="100" height="42" class="node" stroke-width="2" rx="6"/>
  <text x="160" y="85" text-anchor="middle" class="nlabel">Peer A</text>
  <text x="160" y="98" text-anchor="middle" class="nrole">Wants new price</text>

  <rect x="510" y="65" width="100" height="42" class="node" stroke-width="2" rx="6"/>
  <text x="560" y="85" text-anchor="middle" class="nlabel">Peer B</text>
  <text x="560" y="98" text-anchor="middle" class="nrole">Decides</text>

  <!-- Lifelines -->
  <line x1="160" y1="107" x2="160" y2="500" class="life"/>
  <line x1="560" y1="107" x2="560" y2="500" class="life"/>

  <!-- Phase 1: Price update piggybacked -->
  <text x="40" y="132" text-anchor="middle" class="plabel">1</text>
  <text x="40" y="148" text-anchor="middle" class="annot">Update</text>

  <line x1="170" y1="140" x2="548" y2="140" stroke="#5080c0" stroke-width="1.5" marker-end="url(#aR)"/>
  <text x="360" y="133" text-anchor="middle" class="alabel" fill="#5080c0">MeteringReport (new_product_id + new_pricing)</text>
  <text x="360" y="158" text-anchor="middle" class="annot">B inspects field 4-5: a new price is on offer</text>

  <line x1="70" y1="178" x2="660" y2="178" class="sep"/>

  <!-- Alt branch: ACCEPT -->
  <rect x="80" y="195" width="560" height="115" class="alt"/>
  <text x="92" y="210" class="altlabel">alt: ACCEPT (continue)</text>

  <line x1="550" y1="240" x2="172" y2="240" stroke="#d0a040" stroke-width="1.5" marker-end="url(#aL)"/>
  <text x="360" y="233" text-anchor="middle" class="alabel" fill="#d0a040">MeteringReport (continues normally)</text>

  <text x="360" y="263" text-anchor="middle" class="annot">B's continued participation = implicit acceptance</text>
  <text x="360" y="280" text-anchor="middle" class="annot">next interval uses new price</text>
  <text x="360" y="298" text-anchor="middle" class="annot">no extra round-trip</text>

  <!-- Alt branch: REJECT -->
  <rect x="80" y="325" width="560" height="160" class="alt"/>
  <text x="92" y="340" class="altlabel">alt: REJECT (close)</text>

  <line x1="550" y1="370" x2="172" y2="370" stroke="#d0a040" stroke-width="1.5" marker-end="url(#aL)"/>
  <text x="360" y="363" text-anchor="middle" class="alabel" fill="#d0a040">ChannelClose (reason=price_rejected)</text>

  <line x1="170" y1="400" x2="548" y2="400" stroke="#40a060" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#aG)"/>
  <text x="360" y="393" text-anchor="middle" class="alabel" fill="#40a060">CloseAck</text>

  <text x="360" y="425" text-anchor="middle" class="annot">channel settles with mint</text>
  <text x="360" y="442" text-anchor="middle" class="annot">B may renegotiate at the new price or disconnect</text>
  <text x="360" y="468" text-anchor="middle" class="annot">(no metered service to B until renegotiation)</text>

  <!-- Caption -->
  <text x="360" y="525" text-anchor="middle" class="caption">Each metering interval is a renegotiation point — peer always has the option to walk away</text>
</svg>
