<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="monospace" font-size="12">
  <style>
    text          { fill: #e0e0e0; }
    text.title    { font-size: 16px; font-weight: bold; }
    text.subtitle { font-size: 12px; fill: #909090; }
    text.nlabel   { font-size: 13px; font-weight: bold; }
    text.nrole    { font-size: 10px; fill: #909090; }
    text.plabel   { font-size: 13px; font-weight: bold; fill: #909090; }
    text.annot    { font-size: 10px; fill: #909090; font-style: italic; }
    text.alabel   { font-size: 11px; }
    text.caption  { font-size: 11px; fill: #707080; font-style: italic; }
    line.sep      { stroke: #303040; stroke-width: 1; stroke-dasharray: 6,4; }
    line.life     { stroke: #303040; stroke-width: 1; stroke-dasharray: 2,3; }

    .bg           { fill: #0d1117; }
    .callout      { fill: #151520; }
    .node         { fill: #2e3a5e; stroke: #5080c0; }

    @media (prefers-color-scheme: light) {
      text          { fill: #1f2328; }
      text.subtitle, text.nrole, text.plabel, text.annot, text.altlabel,
      text.elabel, text.mdesc, text.tlabel { fill: #656d76; }
      text.caption  { fill: #7c8186; }
      line.sep, line.life { stroke: #d1d9e0; }
      rect.alt      { stroke: #d1d9e0; }
      .bg           { fill: #ffffff; }
      .callout      { fill: #f6f8fa; }
      .node, rect.node { fill: #ddf4ff; stroke: #0969da; }
      rect.compute, rect.result { fill: #f6f8fa; }
    }
  </style>

  <defs>
    <marker id="aR" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#5080c0"/>
    </marker>
    <marker id="aL" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#d0a040"/>
    </marker>
    <marker id="aG" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#40a060"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="440" rx="8" class="bg"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" class="title">Channel Rollover</text>
  <text x="360" y="46" text-anchor="middle" class="subtitle">Sender (funder) initiates when its outgoing channel hits 80% capacity</text>

  <!-- Node headers -->
  <rect x="110" y="65" width="100" height="42" class="node" stroke-width="2" rx="6"/>
  <text x="160" y="85" text-anchor="middle" class="nlabel">Sender</text>
  <text x="160" y="98" text-anchor="middle" class="nrole">channel funder</text>

  <rect x="510" y="65" width="100" height="42" class="node" stroke-width="2" rx="6"/>
  <text x="560" y="85" text-anchor="middle" class="nlabel">Receiver</text>
  <text x="560" y="98" text-anchor="middle" class="nrole">claimant</text>

  <!-- Lifelines -->
  <line x1="160" y1="107" x2="160" y2="400" class="life"/>
  <line x1="560" y1="107" x2="560" y2="400" class="life"/>

  <!-- Phase 1: Initiate -->
  <text x="40" y="132" text-anchor="middle" class="plabel">1</text>
  <text x="40" y="148" text-anchor="middle" class="annot">Initiate</text>

  <text x="160" y="135" text-anchor="middle" class="annot">old channel at 80%</text>

  <line x1="170" y1="160" x2="548" y2="160" stroke="#5080c0" stroke-width="1.5" marker-end="url(#aR)"/>
  <text x="360" y="153" text-anchor="middle" class="alabel" fill="#5080c0">RolloverInit (old_channel_id + new_channel_funding)</text>

  <line x1="70" y1="180" x2="660" y2="180" class="sep"/>

  <!-- Phase 2: Ready -->
  <text x="40" y="202" text-anchor="middle" class="plabel">2</text>
  <text x="40" y="218" text-anchor="middle" class="annot">Verify</text>

  <text x="560" y="205" text-anchor="middle" class="annot">verifies funding proofs</text>

  <line x1="550" y1="230" x2="172" y2="230" stroke="#40a060" stroke-width="1.5" marker-end="url(#aG)"/>
  <text x="360" y="223" text-anchor="middle" class="alabel" fill="#40a060">RolloverReady (new_channel_id)</text>

  <line x1="70" y1="250" x2="660" y2="250" class="sep"/>

  <!-- Phase 3: Overlap (old drains) -->
  <text x="40" y="272" text-anchor="middle" class="plabel">3</text>
  <text x="40" y="288" text-anchor="middle" class="annot">Overlap</text>

  <rect x="100" y="262" width="530" height="60" rx="4" fill="none" stroke="#303040" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="625" y="275" text-anchor="start" class="annot">at each interval</text>

  <line x1="170" y1="290" x2="548" y2="290" stroke="#5080c0" stroke-width="1.5" marker-end="url(#aR)"/>
  <text x="360" y="283" text-anchor="middle" class="alabel" fill="#5080c0">BalanceUpdate on OLD channel (still has capacity)</text>

  <text x="360" y="313" text-anchor="middle" class="annot">old channel drains toward 100%; new channel idle</text>

  <line x1="70" y1="335" x2="660" y2="335" class="sep"/>

  <!-- Phase 4: Switch over -->
  <text x="40" y="357" text-anchor="middle" class="plabel">4</text>
  <text x="40" y="373" text-anchor="middle" class="annot">Switch</text>

  <line x1="170" y1="365" x2="548" y2="365" stroke="#5080c0" stroke-width="1.5" marker-end="url(#aR)"/>
  <text x="360" y="358" text-anchor="middle" class="alabel" fill="#5080c0">BalanceUpdate on NEW channel (old is exhausted)</text>

  <text x="360" y="388" text-anchor="middle" class="annot">old channel settles with mint when receiver is ready</text>

  <!-- Caption -->
  <text x="360" y="425" text-anchor="middle" class="caption">Each peer manages its own outgoing channel — only the funder initiates rollover</text>
</svg>
