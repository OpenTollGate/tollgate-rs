<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="monospace" font-size="12">
  <style>
    text          { fill: #e0e0e0; }
    text.title    { font-size: 16px; font-weight: bold; }
    text.subtitle { font-size: 12px; fill: #909090; }
    text.nlabel   { font-size: 13px; font-weight: bold; }
    text.nrole    { font-size: 10px; fill: #909090; }
    text.plabel   { font-size: 13px; font-weight: bold; fill: #909090; }
    text.annot    { font-size: 10px; fill: #909090; font-style: italic; }
    text.alabel   { font-size: 11px; }
    text.caption  { font-size: 11px; fill: #707080; font-style: italic; }
    line.sep      { stroke: #303040; stroke-width: 1; stroke-dasharray: 6,4; }
    line.life     { stroke: #303040; stroke-width: 1; stroke-dasharray: 2,3; }

    .bg           { fill: #0d1117; }
    .callout      { fill: #151520; }
    .node         { fill: #2e3a5e; stroke: #5080c0; }

    @media (prefers-color-scheme: light) {
      text          { fill: #1f2328; }
      text.subtitle, text.nrole, text.plabel, text.annot, text.altlabel,
      text.elabel, text.mdesc, text.tlabel { fill: #656d76; }
      text.caption  { fill: #7c8186; }
      line.sep, line.life { stroke: #d1d9e0; }
      rect.alt      { stroke: #d1d9e0; }
      .bg           { fill: #ffffff; }
      .callout      { fill: #f6f8fa; }
      .node, rect.node { fill: #ddf4ff; stroke: #0969da; }
      rect.compute, rect.result { fill: #f6f8fa; }
    }
  </style>

  <defs>
    <marker id="aR" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#5080c0"/>
    </marker>
    <marker id="aL" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#d0a040"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="380" rx="8" class="bg"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" class="title">Zero-Price Peering</text>
  <text x="360" y="46" text-anchor="middle" class="subtitle">Both prices = 0 — no funding, no metering, no settlement</text>

  <!-- Node headers -->
  <rect x="110" y="65" width="100" height="42" class="node" stroke-width="2" rx="6"/>
  <text x="160" y="85" text-anchor="middle" class="nlabel">Peer A</text>
  <text x="160" y="98" text-anchor="middle" class="nrole">Provider</text>

  <rect x="510" y="65" width="100" height="42" class="node" stroke-width="2" rx="6"/>
  <text x="560" y="85" text-anchor="middle" class="nlabel">Peer B</text>
  <text x="560" y="98" text-anchor="middle" class="nrole">Provider</text>

  <!-- Lifelines -->
  <line x1="160" y1="107" x2="160" y2="340" class="life"/>
  <line x1="560" y1="107" x2="560" y2="340" class="life"/>

  <!-- Phase 1: Identity -->
  <text x="40" y="132" text-anchor="middle" class="plabel">1</text>
  <text x="40" y="148" text-anchor="middle" class="annot">Identity</text>

  <line x1="170" y1="140" x2="548" y2="140" stroke="#5080c0" stroke-width="1.5" marker-end="url(#aR)"/>
  <text x="360" y="133" text-anchor="middle" class="alabel" fill="#5080c0">Announce</text>

  <line x1="550" y1="165" x2="172" y2="165" stroke="#d0a040" stroke-width="1.5" marker-end="url(#aL)"/>
  <text x="360" y="158" text-anchor="middle" class="alabel" fill="#d0a040">Announce</text>

  <line x1="70" y1="185" x2="660" y2="185" class="sep"/>

  <!-- Phase 2: Pricing -->
  <text x="40" y="207" text-anchor="middle" class="plabel">2</text>
  <text x="40" y="223" text-anchor="middle" class="annot">Pricing</text>

  <line x1="170" y1="215" x2="548" y2="215" stroke="#5080c0" stroke-width="1.5" marker-end="url(#aR)"/>
  <text x="360" y="208" text-anchor="middle" class="alabel" fill="#5080c0">PriceSheet (all prices = 0)</text>

  <line x1="550" y1="240" x2="172" y2="240" stroke="#d0a040" stroke-width="1.5" marker-end="url(#aL)"/>
  <text x="360" y="233" text-anchor="middle" class="alabel" fill="#d0a040">PriceSheet (all prices = 0)</text>

  <line x1="70" y1="260" x2="660" y2="260" class="sep"/>

  <!-- Phase 3: Accept (no funding) -->
  <text x="40" y="282" text-anchor="middle" class="plabel">3</text>
  <text x="40" y="298" text-anchor="middle" class="annot">Accept</text>

  <line x1="550" y1="290" x2="172" y2="290" stroke="#d0a040" stroke-width="1.5" marker-end="url(#aL)"/>
  <text x="360" y="283" text-anchor="middle" class="alabel" fill="#d0a040">Accept (no funding)</text>

  <line x1="170" y1="315" x2="548" y2="315" stroke="#5080c0" stroke-width="1.5" marker-end="url(#aR)"/>
  <text x="360" y="308" text-anchor="middle" class="alabel" fill="#5080c0">Accept (no funding)</text>

  <!-- Caption -->
  <text x="360" y="365" text-anchor="middle" class="caption">Delivery active — no MeteringReport, no BalanceUpdate, no settlement</text>
</svg>
