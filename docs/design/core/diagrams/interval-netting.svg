<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 580" font-family="monospace" font-size="12">
  <style>
    rect.node     { fill: #2e3a5e; stroke: #5080c0; stroke-width: 2; rx: 6; }
    rect.compute  { fill: #151520; stroke: #d0a040; stroke-width: 1.5; rx: 4; }
    rect.result   { fill: #151520; stroke: #40a060; stroke-width: 1.5; rx: 4; }
    text          { fill: #e0e0e0; }
    text.title    { font-size: 16px; font-weight: bold; }
    text.subtitle { font-size: 12px; fill: #909090; }
    text.nlabel   { font-size: 13px; font-weight: bold; }
    text.nrole    { font-size: 10px; fill: #909090; }
    text.plabel   { font-size: 13px; font-weight: bold; fill: #909090; }
    text.annot    { font-size: 10px; fill: #909090; font-style: italic; }
    text.alabel   { font-size: 11px; }
    text.clabel   { font-size: 10px; }
    text.caption  { font-size: 11px; fill: #707080; font-style: italic; }
    line.sep      { stroke: #303040; stroke-width: 1; stroke-dasharray: 6,4; }
    line.life     { stroke: #303040; stroke-width: 1; stroke-dasharray: 2,3; }
    line.meter    { stroke: #5080c0; stroke-width: 2; }
    line.balance  { stroke: #d0a040; stroke-width: 2; }
    line.ack      { stroke: #40a060; stroke-width: 2; stroke-dasharray: 6,3; }
    polygon.meter { fill: #5080c0; }
    polygon.balance { fill: #d0a040; }
    polygon.ack   { fill: #40a060; }

    .bg           { fill: #0d1117; }
    .callout      { fill: #151520; }
    .node         { fill: #2e3a5e; stroke: #5080c0; }

    @media (prefers-color-scheme: light) {
      text          { fill: #1f2328; }
      text.subtitle, text.nrole, text.plabel, text.annot, text.altlabel,
      text.elabel, text.mdesc, text.tlabel { fill: #656d76; }
      text.caption  { fill: #7c8186; }
      line.sep, line.life { stroke: #d1d9e0; }
      rect.alt      { stroke: #d1d9e0; }
      .bg           { fill: #ffffff; }
      .callout      { fill: #f6f8fa; }
      .node, rect.node { fill: #ddf4ff; stroke: #0969da; }
      rect.compute, rect.result { fill: #f6f8fa; }
    }
  </style>

  <!-- Background -->
  <rect width="720" height="580" rx="8" class="bg"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" class="title">Interval Netting</text>
  <text x="360" y="46" text-anchor="middle" class="subtitle">Only the net debtor signs — one signature per interval</text>

  <!-- Node headers -->
  <rect x="120" y="65" width="100" height="42" class="node"/>
  <text x="170" y="85" text-anchor="middle" class="nlabel">Peer A</text>
  <text x="170" y="98" text-anchor="middle" class="nrole">Provider</text>

  <rect x="500" y="65" width="100" height="42" class="node"/>
  <text x="550" y="85" text-anchor="middle" class="nlabel">Peer B</text>
  <text x="550" y="98" text-anchor="middle" class="nrole">Provider</text>

  <!-- Lifelines -->
  <line x1="170" y1="107" x2="170" y2="530" class="life"/>
  <line x1="550" y1="107" x2="550" y2="530" class="life"/>

  <!-- Phase 1: Metering Exchange -->
  <text x="40" y="140" text-anchor="middle" class="plabel">Phase 1</text>
  <text x="40" y="156" text-anchor="middle" class="annot">Metering</text>

  <!-- A → B MeteringReport -->
  <line x1="180" y1="155" x2="538" y2="155" class="meter"/>
  <polygon points="536,150 546,155 536,160" class="meter"/>
  <text x="360" y="148" text-anchor="middle" class="alabel" fill="#5080c0">MeteringReport</text>
  <text x="360" y="172" text-anchor="middle" class="annot">delivered 500 units to B, received 200 units from B</text>

  <!-- B → A MeteringReport -->
  <line x1="540" y1="198" x2="182" y2="198" class="meter"/>
  <polygon points="184,193 174,198 184,203" class="meter"/>
  <text x="360" y="191" text-anchor="middle" class="alabel" fill="#5080c0">MeteringReport</text>
  <text x="360" y="215" text-anchor="middle" class="annot">delivered 200 units to A, received 500 units from A</text>

  <!-- Phase separator -->
  <line x1="70" y1="240" x2="660" y2="240" class="sep"/>

  <!-- Phase 2: Computation -->
  <text x="40" y="273" text-anchor="middle" class="plabel">Phase 2</text>
  <text x="40" y="289" text-anchor="middle" class="annot">Compute</text>

  <rect x="175" y="255" width="370" height="72" class="compute"/>
  <text x="360" y="274" text-anchor="middle" class="clabel" fill="#d0a040">Both sides compute independently (deterministic):</text>
  <text x="360" y="292" text-anchor="middle" class="clabel">A owes B: 200 units x B's price = 2 sats</text>
  <text x="360" y="306" text-anchor="middle" class="clabel">B owes A: 500 units x A's price = 5 sats</text>
  <text x="360" y="321" text-anchor="middle" class="alabel" fill="#d0a040" font-weight="bold">Net: B owes A 3 sats</text>

  <!-- Phase separator -->
  <line x1="70" y1="345" x2="660" y2="345" class="sep"/>

  <!-- Phase 3: Balance Update -->
  <text x="40" y="378" text-anchor="middle" class="plabel">Phase 3</text>
  <text x="40" y="394" text-anchor="middle" class="annot">Update</text>

  <!-- B → A BalanceUpdate -->
  <line x1="540" y1="390" x2="182" y2="390" class="balance"/>
  <polygon points="184,385 174,390 184,395" class="balance"/>
  <text x="360" y="383" text-anchor="middle" class="alabel" fill="#d0a040">BalanceUpdate</text>
  <text x="360" y="407" text-anchor="middle" class="annot">channel B&#8594;A, +3 sats (signed)</text>

  <!-- A → B BalanceAck -->
  <line x1="180" y1="435" x2="538" y2="435" class="ack"/>
  <polygon points="536,430 546,435 536,440" class="ack"/>
  <text x="360" y="428" text-anchor="middle" class="alabel" fill="#40a060">BalanceAck</text>

  <!-- Phase separator -->
  <line x1="70" y1="460" x2="660" y2="460" class="sep"/>

  <!-- Result -->
  <rect x="175" y="475" width="370" height="42" class="result"/>
  <text x="360" y="493" text-anchor="middle" class="clabel" fill="#40a060">Channel B&#8594;A drained by 3 sats</text>
  <text x="360" y="509" text-anchor="middle" class="clabel" fill="#40a060">Channel A&#8594;B unchanged this interval</text>

  <!-- Caption -->
  <text x="360" y="555" text-anchor="middle" class="caption">Netting reduces channel drain to |A's cost - B's cost| per interval</text>
</svg>
