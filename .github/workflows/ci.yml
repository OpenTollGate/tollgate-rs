name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Test
        run: cargo test --workspace

  # Guards the constraint that the core libraries stay no_std (esp32-ready):
  # they must build against a target that has no std.
  no_std:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
      - name: Build core + protocol for a bare-metal target
        run: cargo build -p tollgate-protocol -p tollgate-core --target thumbv7em-none-eabihf

  # Build the single test image ONCE, then fan out integration suites that reuse
  # it (mirrors the FIPS build-once / run-many shape). The image is shared via a
  # docker-save artifact so each matrix leg loads it instead of rebuilding.
  image:
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - name: Build tollgate-test image
        run: testing/scripts/build.sh
      - name: Save image to a tarball
        run: docker save tollgate-test:latest -o /tmp/tollgate-test.tar
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: tollgate-test-image
          path: /tmp/tollgate-test.tar
          retention-days: 1

  integration:
    name: Integration (${{ matrix.suite }})
    runs-on: ubuntu-latest
    needs: [image]
    strategy:
      fail-fast: false
      matrix:
        suite: [detect, bootstrap]
    steps:
      - uses: actions/checkout@v4
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: tollgate-test-image
          path: /tmp
      - name: Load image
        run: docker load -i /tmp/tollgate-test.tar
      - name: Run ${{ matrix.suite }}
        # SKIP_BUILD reuses the loaded image instead of rebuilding it.
        run: SKIP_BUILD=1 testing/${{ matrix.suite }}/test.sh
